name: Cleanup Preview Resources

on:
  pull_request:
    types:
      - closed

concurrency:
  group: cleanup-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Delete preview D1 database
        shell: bash
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          DB_NAME="libroo-preview-pr-${PR_NUMBER}"

          set +e
          D1_INFO_OUTPUT="$(pnpm dlx wrangler@4 d1 info "$DB_NAME" --json 2>&1)"
          D1_INFO_STATUS=$?
          set -e

          if [ "$D1_INFO_STATUS" -eq 0 ]; then
            pnpm dlx wrangler@4 d1 delete "$DB_NAME" --skip-confirmation
          else
            NORMALIZED_INFO="$(printf '%s' "$D1_INFO_OUTPUT" | tr '[:upper:]' '[:lower:]')"
            COMPACT_INFO="$(printf '%s' "$D1_INFO_OUTPUT" | tr -d '[:space:]')"

            if echo "$NORMALIZED_INFO" | grep -Eq 'not[[:space:]-]?found|no[[:space:]]+database|unknown[[:space:]]+database'; then
              echo "No preview DB found for $DB_NAME; skipping delete."
            elif [ -z "$COMPACT_INFO" ] || [ "$COMPACT_INFO" = '{}' ] || [ "$COMPACT_INFO" = '[]' ] || [ "$COMPACT_INFO" = 'null' ]; then
              echo "D1 info returned empty result for $DB_NAME; treating as missing DB and skipping delete."
            else
              echo "Failed to inspect preview DB $DB_NAME before delete." >&2
              echo "$D1_INFO_OUTPUT" >&2
              exit "$D1_INFO_STATUS"
            fi
          fi

      - name: Delete preview Worker
        shell: bash
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          WORKER_NAME="libroo-preview-pr-${PR_NUMBER}"

          pnpm dlx wrangler@4 delete "$WORKER_NAME" --force || true
