name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      CLOUDFLARE_D1_PREVIEW_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_PREVIEW_DATABASE_ID || secrets.CLOUDFLARE_D1_DATABASE_ID }}
      CLOUDFLARE_WORKER_NAME: libroo-website
      CF_DEPLOY_ENV: production
      NUXT_UI_PRO_LICENSE: ${{ secrets.NUXT_UI_PRO_LICENSE }}
      NUXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NUXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NUXT_SITE_URL: ${{ vars.NUXT_SITE_URL }}
      NUXT_PUBLIC_SCRIPTS_UMAMI_ANALYTICS_SCRIPT_INPUT_SRC: ${{ vars.NUXT_PUBLIC_SCRIPTS_UMAMI_ANALYTICS_SCRIPT_INPUT_SRC }}
      NUXT_PUBLIC_SCRIPTS_UMAMI_ANALYTICS_WEBSITE_ID: ${{ vars.NUXT_PUBLIC_SCRIPTS_UMAMI_ANALYTICS_WEBSITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Stage migrations for Wrangler
        run: node ./scripts/prepare-wrangler-migrations.mjs

      - name: Apply production D1 migrations
        run: pnpm dlx wrangler@4.76.0 d1 migrations apply DB --remote --config .output/server/wrangler.json

      - name: Sync production runtime secrets
        run: |
          printf '%s' "${{ secrets.NUXT_TURNSTILE_SECRET_KEY_PRODUCTION }}" \
            | pnpm dlx wrangler@4.76.0 secret put NUXT_TURNSTILE_SECRET_KEY --name "$CLOUDFLARE_WORKER_NAME"

      - name: Deploy production Worker
        run: pnpm dlx wrangler@4.76.0 deploy --config .output/server/wrangler.json --name "$CLOUDFLARE_WORKER_NAME"
